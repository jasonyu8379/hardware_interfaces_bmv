touch:
  device_name: "Default Device"
  pos_scale: 0.75               # mm of Touch movement * this = mm of robot movement (both modes)
  orientation_scale: 0.75       # JY: multiplier on gimbal angle delta sent to robot
  amp_scale_multiplier: 5.0    # JY: additional pos_scale multiplier when amplify mode (button 2) active
  max_haptic_force: 3.3        # safety clamp on Touch motor output (N)
  hd2rob_euler_deg: [90.0, 90.0, 90.0]  # Ry * Rx * Rz rotation, Touch frame -> robot frame
  print_flag: false

  # JY: haptic force feedback (ported from MAA_data_collection_v2.py)
  # haptic_gravity: [-0.245, 0.150, -1.555]  # JY: corrects GinF drift when robot orientation changes after tare #MAA doubt this
  haptic_gravity: [0.0, 0.0, 0.0]  # JY: corrects GinF drift when robot orientation changes after tare #MAA doubt this
  haptic_filtering_enabled: false   # set true to enable deadband/ramp/IIR; spring-damper always active
  haptic_deadband: 0.30        # N, per-axis deadband to suppress [0 to haptic_deadband] noise at rest
  haptic_contact_th: 1.90      # N, force norm threshold for contact detection and equilibrium freeze #MAA made this so high, so it doesn't affect the code
  haptic_ramp_up_time: 0.15    # s, soft-start time constant on contact
  haptic_ramp_down_time: 0.70  # s, soft-stop time constant on release
  haptic_iir_cutoff_hz: 18.0   # Hz, 1st-order IIR lowpass cutoff frequency
  haptic_z_multiplier: 2.0     # extra Z-axis scale factor in axis remap
  haptic_f_max: 100            # N, per-axis hard saturation on spring-damper output #MAA: set so high so it doesn't affect the clampling

  # JY: force-dependent spring-damper gains
  haptic_k_per_N: 20         # N/mm per N of contact force (stiffness; device max ~0.4 N/mm)
  haptic_b_per_N: 0.2       # N·s/mm per N of contact force (damping; device max ~0.001 N·s/mm)
  haptic_k_slew_rate: 1.0      # JY: N/mm/s max rise rate for stiffness — limits abrupt stiffness jump on contact #MAA: set to 1.0 so it doesn't affect the slew, originall 0.5

admittance_controller0:
  dt: 0.002
  log_to_file: false
  log_file_path: "/tmp/admittance0_controller.log"
  compliance6d:
    stiffness: [200, 200, 300, 2, 2, 2] 
    # damping: [3.1, 3.1, 3.1, 0.1, 0.1, 0.1] # for data collection
    damping: [10.0, 10.0, 10.0, 0.3, 0.3, 0.3] # for data collection
    inertia: [0.3, 0.3, 0.3, 0.0015, 0.0015, 0.0015]
  max_spring_force_magnitude: 25 #TODO: MAA-for teleoperation should be 50?
  direct_force_control_gains:
    P_trans: 0.5
    I_trans: 0
    D_trans: 0
    P_rot: 0.5
    I_rot: 0
    D_rot: 0
  direct_force_control_I_limit: [0, 0, 0, 0, 0, 0]
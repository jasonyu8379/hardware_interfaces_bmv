realsense0:
  width: 1280
  height: 720
  framerate: 30
  enable_color: true
  enable_depth: false
  # align_depth_to_color: false
  # serial_number: "127122270237" # realsense master
  serial_number: "128422271715" # realsense follower


admittance_controller0:
  dt: 0.002
  log_to_file: false
  log_file_path: "/tmp/admittance0_controller.log"
  compliance6d:
    stiffness: [200, 200, 300, 2, 2, 2] 
    damping: [4.1, 4.1, 8.1, 0.3, 0.3, 0.3] # for data collection
    inertia: [0.2, 0.2, 0.2, 0.001, 0.001, 0.001
    ]
  max_spring_force_magnitude: 15
  direct_force_control_gains:
    P_trans: 0.5
    I_trans: 0
    D_trans: 0
    P_rot: 0.5
    I_rot: 0
    D_rot: 0
  direct_force_control_I_limit: [0, 0, 0, 0, 0, 0]


#    max_spring_force_magnitude: 15
# always check the first few parameters:
data_folder: "/home/bmv/data/real/HT_large3D_scaling"
mock_hardware: false
bimanual: false

run_robot_thread: true
run_wrench_thread: true
run_rgb_thread: true

plot_rgb: false

rgb_buffer_size: 11
pose_buffer_size: 600
wrench_buffer_size: 2000
camera_selection: "REALSENSE"
force_sensing_mode: "FORCE_MODE_LEPTRINO"
low_damping: [2.0, 2.0, 8.0, 0.1, 0.1, 0.1]
output_rgb_hw: [224, 224]


ur_rtde0:
  robot_ip: "192.168.137.1"
  rtde_frequency: 500.0
  rt_receive_priority: 90
  rt_control_priority: 85
  interface_priority: 80
  linear_vel: 0.5
  linear_acc: 0.5
  servoL_lookahead_time: 0.1
  servoL_gain: 600
  robot_interface_config:
    zone_safety_mode: "SAFETY_MODE_TRUNCATE"
    incre_safety_mode: "SAFETY_MODE_STOP"
    operation_mode: "OPERATION_MODE_CARTESIAN"
    max_incre_m: 0.03
    max_incre_rad: 0.2
    max_incre_joint_rad: 0.0628
    safe_zone: [-0.75, 0.75, -0.85, 0.50, 0.015, 0.75]

leptrino0:
    #ip_address: "192.168.2.101"
    counts_per_force: 1000000
    counts_per_torque: 1000000
    sensor_name: "leptrino0"
    print_flag: false
    fullpath: "/tmp/netft0_data.txt"
    publish_rate: 1000
    noise_level: 0.0
    stall_threshold: 100
    Foffset: [-0.767, 0.155, -0.053]
    Toffset: [-0.021, -0.112, -0.012]
    Gravity: [0.484, 0.037, -0.948]
    Pcom: [-0.003, 0.005, 0.159]
    WrenchSafety: [100.0, 100.0, 150.0, 3, 3, 3]
    PoseSensorTool:  [0.0, 0.0, -0.222, 1.0, 0.0, 0.0, 0.0 ] #[x, y, z, qw, qx, qy, qz]

